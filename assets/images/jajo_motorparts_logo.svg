<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <!-- Background -->
    <rect id="bg" width="480" height="200" rx="20" fill="#0E0E0E"/>

    <!-- Glow filter for accent elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Red gradient for accents -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5555"/>
      <stop offset="100%" stop-color="#C42B2B"/>
    </linearGradient>

    <!-- Clip for rounded rect -->
    <clipPath id="clip">
      <rect width="480" height="200" rx="20"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="480" height="200" rx="20" fill="#0E0E0E"/>

  <!-- Subtle grid lines (very faint) -->
  <g opacity="0.04" stroke="#F0EDE8" stroke-width="1">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
  </g>

  <!-- ── ICON MARK (left side) ─────────────────────────── -->
  <!-- Outer circle ring -->
  <circle cx="90" cy="100" r="62" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- Inner accent arc -->
  <circle cx="90" cy="100" r="62" fill="none" stroke="url(#redGrad)" stroke-width="2.5"
          stroke-dasharray="120 270" stroke-dashoffset="-40" filter="url(#glow)"/>

  <!-- Motorcycle wheel spokes — stylized -->
  <g transform="translate(90,100)" stroke="#2A2A2A" stroke-width="1">
    <line x1="0" y1="-50" x2="0" y2="50"/>
    <line x1="-50" y1="0" x2="50" y2="0"/>
    <line x1="-35" y1="-35" x2="35" y2="35"/>
    <line x1="35" y1="-35" x2="-35" y2="35"/>
  </g>

  <!-- Hub center circle -->
  <circle cx="90" cy="100" r="14" fill="#161616" stroke="#2A2A2A" stroke-width="1.5"/>
  <circle cx="90" cy="100" r="7" fill="url(#redGrad)" filter="url(#glow)"/>

  <!-- Speed / motion lines (right of wheel) -->
  <g filter="url(#glow)" opacity="0.9">
    <line x1="148" y1="92" x2="168" y2="92" stroke="#E84545" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="151" y1="100" x2="174" y2="100" stroke="#E84545" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="148" y1="108" x2="164" y2="108" stroke="#E84545" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ── WORDMARK ───────────────────────────────────────── -->
  <!-- "JAJO" — large, tight, bold -->
  <text x="192" y="115"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="52"
        font-weight="900"
        letter-spacing="-2"
        fill="#F0EDE8">JAJO</text>

  <!-- Thin divider line -->
  <line x1="192" y1="126" x2="410" y2="126" stroke="#2A2A2A" stroke-width="1"/>

  <!-- "MOTORPARTS" — small caps, spaced out -->
  <text x="192" y="147"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="13.5"
        font-weight="400"
        letter-spacing="5.5"
        fill="#8A8480">MOTORPARTS</text>

  <!-- Red accent dot after MOTORPARTS -->
  <circle cx="404" cy="142" r="3" fill="#E84545" filter="url(#glow)"/>

  <!-- ── TAGLINE ────────────────────────────────────────── -->
  <text x="192" y="168"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="10"
        font-weight="300"
        letter-spacing="1.5"
        fill="#4A4644">INVENTORY · TRACK · SYNC</text>

  <!-- ── Border glow (very subtle) ─────────────────────── -->
  <rect width="480" height="200" rx="20"
        fill="none"
        stroke="#E84545"
        stroke-width="1"
        opacity="0.12"/>
</svg>
