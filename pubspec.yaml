publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  connectivity_plus: ^6.0.3
  sqflite: ^2.3.3
  path: ^1.9.0
  device_info_plus: ^10.1.0
  mobile_scanner: ^3.5.6
  fl_chart: ^0.66.2
  intl: ^0.19.0
